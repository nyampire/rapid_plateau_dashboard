name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements-dev.txt
      # DASH_TEST_DATABASE_URL is intentionally unset: the db fixture in
      # tests/conftest.py auto-skips the PostGIS-dependent integration tests
      # so this CI run only exercises the unit-level pytest cases.
      - run: pytest
      # Guard against PRs that updated style.css / app.js / data.js without
      # rerunning frontend/stamp_cache.py; otherwise the deployed bundle ships
      # with a stale ?v=<hash> and browsers can serve a stale cache.
      - name: stamp_cache --check
        run: python3 frontend/stamp_cache.py --check
